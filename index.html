<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwindcss -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#f4f5f7] h-[100vh] flex flex-col items-center justify-center">

    <div class="w-[300px] h-[150px] flex justify-center items-center bg-[url(./assets/bg.png)] bg-cover">
        <img src="assets/Group.png" alt="">
    </div>

    <form action="" class="bg-white p-5 rounded-3xl w-[350px]">
        <div>
            <label for="" class="font-medium text-[1rem]">Mobile Number</label> <br>
            <input type="text" placeholder="Enter your number" class="input rounded-3xl mt-[1rem] mb-[1rem] bg-[#f4f5f7]" id="mobile-number" /> <br>

            <label for="" class="font-medium text-[1rem] ">4 Digit Number</label> <br>
            <input type="text" placeholder="Enter 4 Digit Pin" class="input rounded-3xl mt-[1rem] bg-[#f4f5f7]" id="pin-number" /> <br>

            <button class="btn bg-[#0874f2] text-white w-full rounded-3xl mt-[1rem]" id="login-btn">Login</button>
        </div>
    </form>

    <script>
     
    </script>
    <script src="script.js"></script>
</body>

</html>
